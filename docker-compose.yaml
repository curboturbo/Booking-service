version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: avito_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
    - .env
    depends_on:
      db:
        condition: service_healthy