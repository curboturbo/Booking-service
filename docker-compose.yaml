version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: avito_db
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db 
      - DB_PORT=5432
      - DB_USERNAME=app
      - DB_PASSWORD=secret
      - DB_DATABASE=app
      - HTTP_PORT=8000
    depends_on:
      db:
        condition: service_healthy